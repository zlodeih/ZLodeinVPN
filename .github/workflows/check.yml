name: VPN Checker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - run: python main.py
    
    - run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add cleaned_sub.txt
        
        # Проверяем, есть ли реальные изменения в файле
        if git diff --staged --quiet; then
          echo "Файл не изменился, коммит не требуется."
        else
          git commit -m "Auto-update servers"
          # Аккуратно подтягиваем изменения, если они были сделаны вручную на сайте
          git pull --rebase origin main
          git push origin main
        fi
