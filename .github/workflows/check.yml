name: VPN Checker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: python main.py
    - run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add cleaned_sub.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update servers" && git push)
