name: VPN Checker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 👈 Обязательно скачиваем историю коммитов, чтобы можно было синхронизироваться
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: python main.py
    - run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add cleaned_sub.txt
        
        # Проверяем, есть ли изменения в файле
        if ! git diff --staged --quiet; then
          git commit -m "Auto-update servers"
          # 👈 Скачиваем последние новшества с GitHub перед отправкой (решает ту самую ошибку)
          git pull --rebase origin main
          # Отправляем обновленный файл
          git push
        else
          echo "Нет новых изменений для сохранения"
        fi
